<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL 카운터 픽 분석기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;600&display=swap');

  :root {
    --gold: #C89B3C;
    --gold-light: #F0E6C8;
    --dark: #0A0E17;
    --dark2: #0F1923;
    --dark3: #1A2332;
    --blue: #00D4FF;
    --red: #FF4655;
    --panel: rgba(15,25,35,0.95);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--dark);
    color: var(--gold-light);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG grid */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(200,155,60,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,155,60,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none;
    z-index:0;
  }

  header {
    text-align:center;
    padding: 28px 20px 16px;
    position: relative;
    z-index:2;
  }

  header h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--gold);
    letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(200,155,60,0.5);
  }

  header p {
    font-size: 0.8rem;
    color: rgba(240,230,200,0.5);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  .divider {
    width: 160px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 10px auto 0;
  }

  /* MAIN LAYOUT */
  .app {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 10px 16px 40px;
    position: relative;
    z-index:1;
  }

  /* DROP ZONE */
  .drop-zone-wrap {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .drop-zone {
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 2px dashed var(--gold);
    background: radial-gradient(circle, rgba(200,155,60,0.08) 0%, transparent 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    position: relative;
    cursor: default;
    box-shadow: 0 0 30px rgba(200,155,60,0.1), inset 0 0 30px rgba(200,155,60,0.05);
  }

  .drop-zone.over {
    border-color: var(--blue);
    background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%);
    box-shadow: 0 0 40px rgba(0,212,255,0.3), inset 0 0 30px rgba(0,212,255,0.1);
    transform: scale(1.05);
  }

  .drop-zone.has-champ {
    border-style: solid;
    border-color: var(--gold);
    background: radial-gradient(circle, rgba(200,155,60,0.12) 0%, transparent 70%);
  }

  .drop-icon {
    font-size: 2.2rem;
    opacity: 0.4;
  }
  .drop-label {
    font-size: 0.72rem;
    color: rgba(200,155,60,0.6);
    text-align: center;
    margin-top: 6px;
    letter-spacing: 0.5px;
    line-height: 1.4;
  }

  .drop-champ-img {
    width: 100px; height: 100px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--gold);
    box-shadow: 0 0 20px rgba(200,155,60,0.4);
  }

  .drop-champ-name {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--gold);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  /* RESULT PANEL */
  .result-panel {
    width: 100%;
    max-width: 520px;
    background: var(--panel);
    border: 1px solid rgba(200,155,60,0.2);
    border-radius: 12px;
    overflow: hidden;
    display: none;
    animation: fadeSlideUp 0.4s ease;
  }

  .result-panel.show { display: block; }

  @keyframes fadeSlideUp {
    from { opacity:0; transform: translateY(16px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .result-header {
    background: linear-gradient(135deg, rgba(200,155,60,0.15), rgba(200,155,60,0.05));
    border-bottom: 1px solid rgba(200,155,60,0.2);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .result-champ-icon {
    width: 48px; height: 48px;
    border-radius: 8px;
    object-fit: cover;
    border: 1px solid var(--gold);
  }

  .result-title {
    flex: 1;
  }
  .result-title h2 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.1rem;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .result-title p {
    font-size: 0.72rem;
    color: rgba(240,230,200,0.5);
    margin-top: 2px;
  }

  .counter-list {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .counter-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,70,85,0.2);
    border-left: 3px solid var(--red);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    transition: background 0.2s;
  }

  .counter-card:hover {
    background: rgba(255,70,85,0.06);
  }

  .counter-champ-icon {
    width: 44px; height: 44px;
    border-radius: 6px;
    object-fit: cover;
    border: 1px solid rgba(255,70,85,0.4);
    flex-shrink: 0;
  }

  .counter-info { flex:1; }

  .counter-name {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 0.95rem;
    color: #FF8A94;
    letter-spacing: 0.5px;
  }

  .counter-reason {
    font-size: 0.76rem;
    color: rgba(240,230,200,0.65);
    margin-top: 5px;
    line-height: 1.6;
  }

  .counter-badge {
    font-size: 0.62rem;
    background: rgba(255,70,85,0.2);
    color: var(--red);
    border: 1px solid rgba(255,70,85,0.3);
    border-radius: 4px;
    padding: 2px 7px;
    white-space: nowrap;
    margin-top: 2px;
    display: inline-block;
  }

  .loading-state {
    padding: 30px;
    text-align: center;
    color: rgba(200,155,60,0.6);
    font-size: 0.85rem;
    letter-spacing: 1px;
  }

  .loading-state .spinner {
    width: 32px; height: 32px;
    border: 2px solid rgba(200,155,60,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* CHAMPION GRID */
  .champ-section {
    width: 100%;
    max-width: 520px;
  }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: rgba(200,155,60,0.5);
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  .search-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(200,155,60,0.2);
    border-radius: 8px;
    padding: 9px 14px 9px 36px;
    color: var(--gold-light);
    font-size: 0.82rem;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input::placeholder { color: rgba(200,155,60,0.3); }
  .search-wrap input:focus { border-color: var(--gold); }
  .search-wrap .s-icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: rgba(200,155,60,0.4);
    font-size: 0.9rem;
  }

  .champ-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
    gap: 8px;
    max-height: 320px;
    overflow-y: auto;
    padding: 2px;
  }

  .champ-grid::-webkit-scrollbar { width: 4px; }
  .champ-grid::-webkit-scrollbar-track { background: transparent; }
  .champ-grid::-webkit-scrollbar-thumb { background: rgba(200,155,60,0.3); border-radius: 2px; }

  .champ-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: grab;
    transition: transform 0.15s, opacity 0.15s;
    user-select: none;
    -webkit-user-drag: element;
  }

  .champ-tile:active { cursor: grabbing; }
  .champ-tile:hover { transform: translateY(-3px); }

  .champ-tile img {
    width: 52px; height: 52px;
    border-radius: 8px;
    object-fit: cover;
    border: 1px solid rgba(200,155,60,0.25);
    pointer-events: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .champ-tile:hover img {
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(200,155,60,0.35);
  }

  .champ-tile span {
    font-size: 0.58rem;
    color: rgba(240,230,200,0.55);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
  }

  .dragging { opacity: 0.4; transform: scale(0.95); }

  .reset-btn {
    margin-top: 8px;
    background: none;
    border: 1px solid rgba(200,155,60,0.25);
    color: rgba(200,155,60,0.6);
    font-size: 0.72rem;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    display: none;
  }
  .reset-btn:hover { border-color: var(--gold); color: var(--gold); }
  .reset-btn.show { display: inline-block; }

  .error-msg {
    padding: 20px;
    text-align: center;
    color: rgba(255,70,85,0.7);
    font-size: 0.8rem;
  }

  /* SPLASH ART */
  .splash-banner {
    width: 100%;
    max-width: 520px;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    display: none;
    animation: fadeSlideUp 0.5s ease;
    border: 1px solid rgba(200,155,60,0.25);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .splash-banner.show { display: block; }

  .splash-banner img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    object-position: top center;
    display: block;
    filter: brightness(0.85);
    transition: filter 0.3s;
  }
  .splash-banner:hover img { filter: brightness(1); }

  .splash-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      transparent 30%,
      rgba(10,14,23,0.7) 70%,
      rgba(10,14,23,0.95) 100%
    );
    pointer-events: none;
  }

  .splash-label {
    position: absolute;
    bottom: 12px;
    left: 16px;
    right: 16px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .splash-label h3 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.5rem;
    color: #fff;
    letter-spacing: 2px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }

  .splash-label .role-tag {
    font-size: 0.68rem;
    background: rgba(200,155,60,0.25);
    border: 1px solid rgba(200,155,60,0.5);
    color: var(--gold);
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  /* Counter card — bigger image */
  .counter-splash {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    object-fit: cover;
    object-position: top center;
    border: 1px solid rgba(255,70,85,0.4);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <h1>⚔ COUNTER PICK ANALYZER</h1>
  <p>챔피언을 원 안으로 드래그하세요 · 2026 시즌 기준</p>
  <div class="divider"></div>
</header>

<div class="app">

  <!-- DROP ZONE -->
  <div class="drop-zone-wrap">
    <div class="drop-zone" id="dropZone">
      <span class="drop-icon" id="dropIcon">⬇</span>
      <span class="drop-label" id="dropLabel">여기에 챔피언을<br>드래그하세요</span>
    </div>
    <button class="reset-btn" id="resetBtn" onclick="resetChamp()">↺ 초기화</button>
  </div>

  <!-- SPLASH BANNER -->
  <div class="splash-banner" id="splashBanner">
    <img id="splashImg" src="" alt="">
    <div class="splash-overlay"></div>
    <div class="splash-label">
      <h3 id="splashName"></h3>
      <span class="role-tag" id="splashRole"></span>
    </div>
  </div>

  <!-- RESULT PANEL -->
  <div class="result-panel" id="resultPanel">
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      카운터 분석 중...
    </div>
    <div id="resultContent"></div>
  </div>

  <!-- CHAMPION LIST -->
  <div class="champ-section">
    <div class="section-label">챔피언 목록 — 드래그하여 선택</div>
    <div class="search-wrap">
      <span class="s-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="챔피언 검색..." oninput="filterChamps()">
    </div>
    <div class="champ-grid" id="champGrid"></div>
  </div>

</div>

<script>
// ========== DATA ==========
const champions = [
  "Aatrox","Ahri","Akali","Akshan","Alistar","Amumu","Anivia","Annie","Aphelios",
  "Ashe","Aurelion Sol","Azir","Bard","Bel'Veth","Blitzcrank","Brand","Braum",
  "Briar","Caitlyn","Camille","Cassiopeia","Cho'Gath","Corki","Darius","Diana",
  "Dr. Mundo","Draven","Ekko","Elise","Evelynn","Ezreal","Fiddlesticks","Fiora",
  "Fizz","Galio","Gangplank","Garen","Gnar","Gragas","Graves","Gwen","Hecarim",
  "Heimerdinger","Illaoi","Irelia","Ivern","Janna","Jarvan IV","Jax","Jayce",
  "Jhin","Jinx","K'Sante","Kai'Sa","Kalista","Karma","Karthus","Kassadin",
  "Katarina","Kayle","Kayn","Kennen","Kha'Zix","Kindred","Kled","Kog'Maw",
  "LeBlanc","Lee Sin","Leona","Lillia","Lissandra","Lucian","Lulu","Lux",
  "Malphite","Malzahar","Maokai","Master Yi","Miss Fortune","Mordekaiser",
  "Morgana","Naafiri","Nami","Nasus","Nautilus","Neeko","Nidalee","Nilah",
  "Nocturne","Nunu & Willump","Olaf","Orianna","Ornn","Pantheon","Poppy",
  "Pyke","Qiyana","Quinn","Rakan","Rammus","Rek'Sai","Rell","Renata Glasc",
  "Renekton","Rengar","Riven","Rumble","Ryze","Samira","Sejuani","Senna",
  "Seraphine","Sett","Shaco","Shen","Shyvana","Singed","Sion","Sivir","Skarner",
  "Smolder","Sona","Soraka","Swain","Sylas","Syndra","Tahm Kench","Taliyah",
  "Talon","Taric","Teemo","Thresh","Tristana","Trundle","Tryndamere","Twisted Fate",
  "Twitch","Udyr","Urgot","Varus","Vayne","Veigar","Vel'Koz","Vex","Vi","Viego",
  "Viktor","Vladimir","Volibear","Warwick","Wukong","Xayah","Xerath","Xin Zhao",
  "Yasuo","Yone","Yorick","Yuumi","Zac","Zed","Zeri","Ziggs","Zilean","Zoe","Zyra"
];

function champId(name) {
  const map = {
    "Aurelion Sol":"AurelionSol","Bel'Veth":"Belveth","Cho'Gath":"Chogath",
    "Dr. Mundo":"DrMundo","Jarvan IV":"JarvanIV","K'Sante":"KSante",
    "Kai'Sa":"Kaisa","Kha'Zix":"Khazix","Kog'Maw":"KogMaw","LeBlanc":"Leblanc",
    "Lee Sin":"LeeSin","Master Yi":"MasterYi","Miss Fortune":"MissFortune",
    "Naafiri":"Naafiri","Nunu & Willump":"Nunu","Orianna":"Orianna",
    "Rek'Sai":"RekSai","Renata Glasc":"Renata","Tahm Kench":"TahmKench",
    "Twisted Fate":"TwistedFate","Vel'Koz":"Velkoz","Xin Zhao":"XinZhao",
    "Kog'Maw":"KogMaw"
  };
  return map[name] || name.replace(/[^a-zA-Z0-9]/g,'');
}

function iconUrl(name) {
  return `https://ddragon.leagueoflegends.com/cdn/14.24.1/img/champion/${champId(name)}.png`;
}

function splashUrl(name) {
  return `https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${champId(name)}_0.jpg`;
}

// ========== RENDER CHAMPS ==========
let allChamps = [...champions];
let filteredChamps = [...allChamps];

function renderChamps(list) {
  const grid = document.getElementById('champGrid');
  grid.innerHTML = '';
  list.forEach(name => {
    const tile = document.createElement('div');
    tile.className = 'champ-tile';
    tile.draggable = true;
    tile.dataset.name = name;
    tile.innerHTML = `<img src="${iconUrl(name)}" alt="${name}" onerror="this.src='https://ddragon.leagueoflegends.com/cdn/14.24.1/img/champion/Ryze.png'"><span>${name}</span>`;
    tile.addEventListener('dragstart', onDragStart);
    tile.addEventListener('dragend', onDragEnd);
    // Touch support
    tile.addEventListener('touchstart', onTouchStart, {passive:true});
    grid.appendChild(tile);
  });
}

function filterChamps() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filteredChamps = allChamps.filter(c => c.toLowerCase().includes(q));
  renderChamps(filteredChamps);
}

renderChamps(allChamps);

// ========== DRAG & DROP ==========
let dragName = null;
let dragEl = null;

function onDragStart(e) {
  dragName = e.currentTarget.dataset.name;
  dragEl = e.currentTarget;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.setData('text/plain', dragName);
}

function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
}

const dropZone = document.getElementById('dropZone');

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('over');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('over');
});

dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('over');
  const name = e.dataTransfer.getData('text/plain') || dragName;
  if (name) loadChampion(name);
});

// ========== TOUCH SUPPORT ==========
let touchChamp = null;
let ghost = null;

function onTouchStart(e) {
  const tile = e.currentTarget;
  touchChamp = tile.dataset.name;
  ghost = tile.cloneNode(true);
  ghost.style.cssText = `position:fixed;opacity:0.8;pointer-events:none;z-index:9999;width:60px;`;
  document.body.appendChild(ghost);

  tile.addEventListener('touchmove', onTouchMove, {passive:false});
  tile.addEventListener('touchend', onTouchEnd);
}

function onTouchMove(e) {
  e.preventDefault();
  const t = e.touches[0];
  if (ghost) { ghost.style.left = (t.clientX - 30)+'px'; ghost.style.top = (t.clientY - 30)+'px'; }
  const dz = dropZone.getBoundingClientRect();
  if (t.clientX > dz.left && t.clientX < dz.right && t.clientY > dz.top && t.clientY < dz.bottom) {
    dropZone.classList.add('over');
  } else {
    dropZone.classList.remove('over');
  }
}

function onTouchEnd(e) {
  const t = e.changedTouches[0];
  if (ghost) { ghost.remove(); ghost = null; }
  dropZone.classList.remove('over');
  const dz = dropZone.getBoundingClientRect();
  if (t.clientX > dz.left && t.clientX < dz.right && t.clientY > dz.top && t.clientY < dz.bottom) {
    loadChampion(touchChamp);
  }
  e.currentTarget.removeEventListener('touchmove', onTouchMove);
  e.currentTarget.removeEventListener('touchend', onTouchEnd);
}

// ========== HARDCODED COUNTER DATA (2026 시즌 기준) ==========
const counterDB = {
  "Aatrox": { role: "탑", counters: [
    { name: "Vayne", severity: "압도적", reason: "실버 볼트의 트루 데미지가 Aatrox의 높은 HP를 무시하고 녹여버립니다. 텀블로 스킬을 회피하며 1:1 교전에서 우위를 점합니다." },
    { name: "Fiora", severity: "매우 강함", reason: "리포스트로 Aatrox의 Q를 막고 역으로 스턴을 넣을 수 있습니다. 바이탈 시스템으로 짧은 교전에서도 높은 피해를 입힙니다." },
    { name: "Gwen", severity: "강함", reason: "W 무적 구간으로 Aatrox의 핵심 스킬을 무효화합니다. 지속 딜링 능력이 Aatrox의 회복보다 높아 장기전에서도 유리합니다." },
    { name: "Camille", severity: "강함", reason: "W의 트루 데미지 구간이 Aatrox의 회복을 압도합니다. 이동기로 스킬 회피가 용이하며 분리 능력으로 도망도 막습니다." }

// ========== LOAD CHAMPION ==========
function loadChampion(name) {
  // Show splash banner immediately
  const splashBanner = document.getElementById('splashBanner');
  document.getElementById('splashImg').src = splashUrl(name);
  document.getElementById('splashImg').onerror = function(){ this.src = iconUrl(name); this.style.height='140px'; };
  document.getElementById('splashName').textContent = name;
  splashBanner.classList.add('show');

  // Update drop zone
  dropZone.classList.add('has-champ');
  dropZone.innerHTML = `
    <img class="drop-champ-img" src="${iconUrl(name)}" onerror="this.src='https://ddragon.leagueoflegends.com/cdn/14.24.1/img/champion/Ryze.png'">
    <div class="drop-champ-name">${name}</div>
  `;
  document.getElementById('resetBtn').classList.add('show');

  // Show panel
  const panel = document.getElementById('resultPanel');
  panel.classList.add('show');
  document.getElementById('loadingState').style.display = 'none';

  const data = counterDB[name] || getDefaultCounters(name);
  data.champion = name;
  document.getElementById('splashRole').textContent = data.role || '';
  renderResult(data);
}

function renderResult(data) {
  document.getElementById('loadingState').style.display = 'none';
  // Update splash role
  document.getElementById('splashRole').textContent = data.role || '';

  const counters = data.counters || [];
  let html = `
    <div class="result-header">
      <img class="result-champ-icon" src="${iconUrl(data.champion)}" onerror="this.src='https://ddragon.leagueoflegends.com/cdn/14.24.1/img/champion/Ryze.png'">
      <div class="result-title">
        <h2>${data.champion}</h2>
        <p>${data.role} · 2026 시즌 카운터 픽</p>
      </div>
    </div>
    <div class="counter-list">
  `;

  counters.forEach(c => {
    html += `
      <div class="counter-card">
        <img class="counter-splash" src="${splashUrl(c.name)}" onerror="this.src='${iconUrl(c.name)}';this.style.objectPosition='center';" alt="${c.name}">
        <div class="counter-info">
          <div class="counter-name">${c.name}</div>
          <span class="counter-badge">${c.severity || '강함'}</span>
          <div class="counter-reason">${c.reason}</div>
        </div>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById('resultContent').innerHTML = html;
}

function resetChamp() {
  dropZone.classList.remove('has-champ');
  dropZone.innerHTML = `
    <span class="drop-icon" id="dropIcon">⬇</span>
    <span class="drop-label" id="dropLabel">여기에 챔피언을<br>드래그하세요</span>
  `;
  document.getElementById('resetBtn').classList.remove('show');
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('splashBanner').classList.remove('show');
}
