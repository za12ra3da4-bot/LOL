<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL 실시간 카운터 분석기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;600&display=swap');
:root{
  --gold:#C89B3C;--gold-light:#F0E6C8;--dark:#060A12;--dark2:#0D1520;
  --blue:#00D4FF;--red:#FF4655;--green:#00E676;--panel:rgba(10,18,30,0.98);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--gold-light);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}

/* BG */
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 120% 60% at 50% 0%, rgba(200,155,60,0.06) 0%, transparent 60%),
  linear-gradient(rgba(200,155,60,0.025) 1px,transparent 1px),
  linear-gradient(90deg,rgba(200,155,60,0.025) 1px,transparent 1px);
  background-size:auto,50px 50px,50px 50px;pointer-events:none;z-index:0;}

header{text-align:center;padding:26px 20px 14px;position:relative;z-index:2;}
.header-badge{display:inline-block;font-size:0.6rem;letter-spacing:2px;color:var(--blue);border:1px solid rgba(0,212,255,0.3);border-radius:20px;padding:2px 10px;margin-bottom:8px;}
header h1{font-family:'Black Han Sans',sans-serif;font-size:clamp(1.3rem,5vw,2.1rem);color:var(--gold);letter-spacing:4px;text-shadow:0 0 30px rgba(200,155,60,0.4);}
header p{font-size:0.72rem;color:rgba(240,230,200,0.4);margin-top:6px;letter-spacing:1px;}
.divider{width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:10px auto 0;}

.app{display:flex;flex-direction:column;align-items:center;gap:16px;padding:14px 14px 50px;position:relative;z-index:1;}

/* DROP ZONE */
.drop-zone-wrap{width:100%;max-width:580px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.drop-zone{
  width:140px;height:140px;border-radius:50%;
  border:2px dashed rgba(200,155,60,0.5);
  background:radial-gradient(circle,rgba(200,155,60,0.06) 0%,transparent 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:all 0.3s ease;cursor:default;
  box-shadow:0 0 40px rgba(200,155,60,0.08),inset 0 0 40px rgba(200,155,60,0.04);
  position:relative;
}
.drop-zone::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:1px solid rgba(200,155,60,0.1);
}
.drop-zone.over{
  border-color:var(--blue);
  background:radial-gradient(circle,rgba(0,212,255,0.12) 0%,transparent 70%);
  box-shadow:0 0 60px rgba(0,212,255,0.25),inset 0 0 40px rgba(0,212,255,0.08);
  transform:scale(1.06);
}
.drop-zone.has-champ{border-style:solid;border-color:var(--gold);background:radial-gradient(circle,rgba(200,155,60,0.1) 0%,transparent 70%);}
.drop-icon{font-size:2.2rem;opacity:0.35;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.35;}50%{opacity:0.6;}}
.drop-label{font-size:0.68rem;color:rgba(200,155,60,0.55);text-align:center;margin-top:6px;line-height:1.5;}
.drop-champ-img{width:100px;height:100px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);box-shadow:0 0 24px rgba(200,155,60,0.4);}
.drop-champ-name{font-family:'Black Han Sans',sans-serif;font-size:0.9rem;color:var(--gold);margin-top:6px;letter-spacing:1px;}
.reset-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(200,155,60,0.2);color:rgba(200,155,60,0.55);font-size:0.68rem;padding:5px 14px;border-radius:20px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;display:none;letter-spacing:0.5px;}
.reset-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(200,155,60,0.06);}
.reset-btn.show{display:inline-block;}

/* SPLASH */
.splash-banner{width:100%;max-width:580px;border-radius:14px;overflow:hidden;position:relative;display:none;animation:fadeUp 0.5s ease;border:1px solid rgba(200,155,60,0.2);box-shadow:0 12px 40px rgba(0,0,0,0.6);}
.splash-banner.show{display:block;}
.splash-banner img{width:100%;height:200px;object-fit:cover;object-position:top center;display:block;filter:brightness(0.8);}
.splash-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,10,18,0) 20%,rgba(6,10,18,0.7) 65%,rgba(6,10,18,0.96) 100%);pointer-events:none;}
.splash-label{position:absolute;bottom:14px;left:18px;right:18px;display:flex;align-items:flex-end;justify-content:space-between;}
.splash-label h3{font-family:'Black Han Sans',sans-serif;font-size:1.5rem;color:#fff;letter-spacing:2px;text-shadow:0 2px 10px rgba(0,0,0,0.9);}
.role-pill{font-size:0.62rem;background:rgba(200,155,60,0.2);border:1px solid rgba(200,155,60,0.5);color:var(--gold);padding:3px 11px;border-radius:20px;letter-spacing:1.5px;white-space:nowrap;backdrop-filter:blur(4px);}

/* MAIN RESULT */
.result-panel{width:100%;max-width:580px;background:var(--panel);border:1px solid rgba(200,155,60,0.15);border-radius:14px;overflow:hidden;display:none;animation:fadeUp 0.4s ease;box-shadow:0 8px 40px rgba(0,0,0,0.5);}
.result-panel.show{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* RESULT HEADER */
.result-header{background:linear-gradient(135deg,rgba(200,155,60,0.12),rgba(200,155,60,0.04));border-bottom:1px solid rgba(200,155,60,0.15);padding:14px 18px;display:flex;align-items:center;gap:12px;}
.result-champ-icon{width:46px;height:46px;border-radius:8px;object-fit:cover;border:1px solid rgba(200,155,60,0.5);box-shadow:0 0 12px rgba(200,155,60,0.2);}
.result-title h2{font-family:'Black Han Sans',sans-serif;font-size:1.05rem;color:var(--gold);letter-spacing:1px;}
.result-title p{font-size:0.68rem;color:rgba(240,230,200,0.45);margin-top:3px;}
.live-badge{display:inline-flex;align-items:center;gap:4px;font-size:0.55rem;background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);color:var(--green);padding:2px 8px;border-radius:10px;margin-left:8px;}
.live-dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:blink 1.2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* LANE TABS */
.lane-tabs{display:flex;border-bottom:1px solid rgba(200,155,60,0.12);background:rgba(0,0,0,0.25);overflow-x:auto;scrollbar-width:none;}
.lane-tabs::-webkit-scrollbar{display:none;}
.lane-tab{flex:1;min-width:68px;background:none;border:none;color:rgba(200,155,60,0.45);font-family:'Noto Sans KR',sans-serif;font-size:0.65rem;padding:11px 6px 9px;cursor:pointer;transition:all 0.2s;border-bottom:2px solid transparent;white-space:nowrap;}
.lane-tab.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(200,155,60,0.05);}
.lane-tab:hover:not(.active){color:rgba(200,155,60,0.75);}
.lane-tab .tab-icon{display:block;font-size:1rem;margin-bottom:2px;}

/* COUNTER CONTENT */
.lane-content{padding:16px;}

/* LOADING */
.loading-box{display:flex;flex-direction:column;align-items:center;gap:14px;padding:32px 20px;}
.loading-box .spinner{width:36px;height:36px;border:2px solid rgba(200,155,60,0.15);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-box p{font-size:0.8rem;color:rgba(200,155,60,0.5);letter-spacing:1px;}
.loading-box .sub{font-size:0.65rem;color:rgba(240,230,200,0.3);}

/* COUNTER CARDS */
.counter-grid{display:flex;flex-direction:column;gap:10px;}
.counter-card{
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,70,85,0.15);
  border-left:3px solid var(--red);
  border-radius:10px;padding:11px 13px;
  display:flex;gap:11px;align-items:flex-start;
  transition:background 0.2s,transform 0.15s;
  animation:cardIn 0.3s ease both;
}
@keyframes cardIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.counter-card:hover{background:rgba(255,70,85,0.05);transform:translateX(2px);}
.counter-card:nth-child(1){animation-delay:0.05s}
.counter-card:nth-child(2){animation-delay:0.1s}
.counter-card:nth-child(3){animation-delay:0.15s}
.counter-card:nth-child(4){animation-delay:0.2s}
.counter-card:nth-child(5){animation-delay:0.25s}
.cc-img{width:58px;height:58px;border-radius:8px;object-fit:cover;object-position:top center;border:1px solid rgba(255,70,85,0.35);flex-shrink:0;}
.cc-info{flex:1;min-width:0;}
.cc-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:3px;}
.cc-name{font-family:'Black Han Sans',sans-serif;font-size:0.92rem;color:#FF8A94;letter-spacing:0.5px;}
.cc-wr{font-size:0.62rem;background:rgba(255,70,85,0.15);border:1px solid rgba(255,70,85,0.3);color:#FF8A94;padding:2px 7px;border-radius:10px;}
.cc-wr.high{background:rgba(255,70,85,0.25);border-color:rgba(255,70,85,0.5);color:var(--red);}
.cc-reason{font-size:0.72rem;color:rgba(240,230,200,0.62);line-height:1.65;}
.cc-tip{font-size:0.67rem;color:rgba(0,212,255,0.6);margin-top:4px;font-style:italic;}

.source-note{font-size:0.6rem;color:rgba(240,230,200,0.25);text-align:right;padding:8px 14px 10px;border-top:1px solid rgba(200,155,60,0.08);}
.source-note a{color:rgba(0,212,255,0.4);text-decoration:none;}
.source-note a:hover{color:var(--blue);}

.error-box{padding:24px;text-align:center;color:rgba(255,70,85,0.6);font-size:0.8rem;line-height:1.7;}
.retry-btn{margin-top:10px;background:rgba(255,70,85,0.1);border:1px solid rgba(255,70,85,0.3);color:var(--red);padding:6px 16px;border-radius:8px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:0.72rem;transition:all 0.2s;}
.retry-btn:hover{background:rgba(255,70,85,0.2);}

/* CHAMPION GRID */
.champ-section{width:100%;max-width:580px;}
.section-label{font-size:0.65rem;letter-spacing:2px;color:rgba(200,155,60,0.4);text-transform:uppercase;margin-bottom:9px;padding-left:2px;}
.search-wrap{position:relative;margin-bottom:10px;}
.search-wrap input{
  width:100%;background:rgba(255,255,255,0.03);
  border:1px solid rgba(200,155,60,0.18);border-radius:10px;
  padding:9px 14px 9px 36px;color:var(--gold-light);
  font-size:0.78rem;font-family:'Noto Sans KR',sans-serif;outline:none;
  transition:border-color 0.2s,background 0.2s;
}
.search-wrap input:focus{border-color:rgba(200,155,60,0.5);background:rgba(255,255,255,0.05);}
.search-wrap input::placeholder{color:rgba(200,155,60,0.25);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(200,155,60,0.35);font-size:0.85rem;}
.champ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:7px;max-height:300px;overflow-y:auto;padding:3px;}
.champ-grid::-webkit-scrollbar{width:3px;}
.champ-grid::-webkit-scrollbar-thumb{background:rgba(200,155,60,0.25);border-radius:2px;}
.champ-tile{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:grab;transition:transform 0.15s,opacity 0.15s;user-select:none;-webkit-user-drag:element;}
.champ-tile:active{cursor:grabbing;}
.champ-tile:hover{transform:translateY(-4px);}
.champ-tile img{width:50px;height:50px;border-radius:8px;object-fit:cover;border:1px solid rgba(200,155,60,0.2);pointer-events:none;transition:all 0.2s;}
.champ-tile:hover img{border-color:var(--gold);box-shadow:0 0 12px rgba(200,155,60,0.3);}
.champ-tile span{font-size:0.52rem;color:rgba(240,230,200,0.5);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;}
.dragging{opacity:0.35;transform:scale(0.92);}
</style>
</head>

<header>
  <div class="header-badge">🔴 LIVE DATA · PATCH 26.8</div>
  <h1>⚔ REAL COUNTER PICK</h1>

  <div class="divider"></div>
</header>

<div class="app">
  <div class="drop-zone-wrap">
    <div class="drop-zone" id="dropZone">

  <div class="result-panel" id="resultPanel">

      <img class="result-champ-icon" id="resultIcon" src="" alt="">
      <div class="result-title">
        <div style="display:flex;align-items:center">
          <h2 id="resultName"></h2>
          <span class="live-badge"><span class="live-dot"></span>LIVE</span>
        </div>

      </div>
    </div>

    <div class="lane-tabs" id="laneTabs" style="display:none">

    <div class="lane-content" id="laneContent">
      <div class="loading-box" id="loadingBox" style="display:none">
        <div class="spinner"></div>
        <p id="loadingMsg">데이터 조사 중...</p>
        <div class="sub" id="loadingSub">u.gg에서 실제 카운터 데이터를 가져오는 중입니다</div>
      </div>
      <div id="counterContent"></div>
    </div>

    <div class="source-note">데이터 출처: <a href="https://u.gg" target="_blank">u.gg</a> · Patch 26.8 · Emerald+ 기준</div>
  </div>

  <div class="champ-section">
    <div class="section-label">챔피언 목록 — 드래그하여 선택</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>

    </div>
    <div class="champ-grid" id="champGrid"></div>
  </div>
</div>

function cid(n){return idMap[n]||n.replace(/[^a-zA-Z0-9]/g,'');}
function iconUrl(n){return `https://ddragon.leagueoflegends.com/cdn/14.24.1/img/champion/${cid(n)}.png`;}
function splashUrl(n){return `https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${cid(n)}_0.jpg`;}

// u.gg URL slug
function uggSlug(n){
  const m={
    "Aurelion Sol":"aurelion-sol","Bel'Veth":"bel-veth","Cho'Gath":"cho-gath",
    "Dr. Mundo":"dr-mundo","Jarvan IV":"jarvan-iv","K'Sante":"k-sante",
    "Kai'Sa":"kai-sa","Kha'Zix":"kha-zix","Kog'Maw":"kog-maw","LeBlanc":"leblanc",
    "Lee Sin":"lee-sin","Master Yi":"master-yi","Miss Fortune":"miss-fortune",
    "Nunu & Willump":"nunu-willump","Rek'Sai":"rek-sai","Renata Glasc":"renata-glasc",
    "Tahm Kench":"tahm-kench","Twisted Fate":"twisted-fate","Vel'Koz":"vel-koz",
    "Xin Zhao":"xin-zhao","Wukong":"wukong"
  };
  return m[n]||n.toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-');
}

// Lane role map for u.gg
const laneRoleMap = {
  top:'top', jungle:'jungle', mid:'middle', adc:'adc', support:'support'
};
const laneNames = {top:'탑',jungle:'정글',mid:'미드',adc:'원딜',support:'서포터'};
const laneIcons = {top:'🛡',jungle:'🌿',mid:'⚡',adc:'🏹',support:'💫'};

// Cache
const cache = {};
let currentChamp = null;
let currentLane = 'top';

// ========== API CALL ==========
async function callAPI(messages, tools) {
  const body = {
    model: "claude-sonnet-4-20250514",
    max_tokens: 2000,
    system: "You are a League of Legends expert analyst. Use web search to find real current counter data. Always respond with ONLY a raw JSON object — no markdown, no explanation, no code fences.",
    messages
  };
  if (tools) body.tools = tools;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" }
  });
  // Note: auth is injected by the claude.ai proxy
  const realRes = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!realRes.ok) {
    const errText = await realRes.text();
    throw new Error(`API ${realRes.status}: ${errText.slice(0,200)}`);
  }
  return realRes.json();
}

// Multi-turn: handle tool_use → tool_result agentic loop
async function fetchCounters(champName, lane) {
  const key = `${champName}::${lane}`;
  if (cache[key]) return cache[key];

  const laneKr = laneNames[lane];
  const role = laneRoleMap[lane];
  const slug = uggSlug(champName);

  const userMsg = `Search for "${champName} counter ${role} u.gg patch 26 2026 site:u.gg OR site:mobafire.com OR site:op.gg" and find the top 5 counter picks for ${champName} in the ${laneKr} role.

Then return ONLY this JSON (no markdown, no fences):
{"role":"${laneKr}","counters":[{"name":"English champion name","winRate":"e.g. 54.1%","reason":"2 sentences: WHY this champion counters ${champName} — mention specific skills/mechanics of BOTH champions","tip":"1 sentence: key tip when playing this counter"}]}

Rules:
- 5 counters total
- Each reason must be UNIQUE and specific to ${champName}'s actual weaknesses
- Use real win rate data from search results if available
- Champion names in English`;

  let messages = [{ role: "user", content: userMsg }];
  const tools = [{ type: "web_search_20250305", name: "web_search" }];

  // Agentic loop: up to 5 turns to handle tool use
  for (let i = 0; i < 5; i++) {
    const body = {
      model: "claude-sonnet-4-20250514",
      max_tokens: 2000,
      system: "You are a League of Legends expert analyst. Use web search to find real current counter data. Always respond with ONLY a raw JSON object — no markdown, no explanation, no code fences.",
      tools,
      messages
    };

    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const t = await res.text();
      throw new Error(`API ${res.status}: ${t.slice(0, 200)}`);
    }

    const data = await res.json();
    const content = data.content || [];

    // Add assistant turn
    messages.push({ role: "assistant", content });

    // Check stop reason
    if (data.stop_reason === "end_turn") {
      // Extract final text
      let text = content.filter(b => b.type === "text").map(b => b.text).join("");
      text = text.replace(/```json|```/g, "").trim();
      const s = text.indexOf("{"), e = text.lastIndexOf("}");
      if (s === -1 || e === -1) throw new Error("No JSON in response");
      const json = JSON.parse(text.slice(s, e + 1));
      cache[key] = json;
      return json;
    }

    // Handle tool_use blocks
    if (data.stop_reason === "tool_use") {
      const toolResults = content
        .filter(b => b.type === "tool_use")
        .map(b => ({
          type: "tool_result",
          tool_use_id: b.id,
          content: b.input ? `Searching: ${JSON.stringify(b.input)}` : "search executed"
        }));
      messages.push({ role: "user", content: toolResults });
      continue;
    }

    // Unexpected stop
    throw new Error(`Unexpected stop_reason: ${data.stop_reason}`);
  }

  throw new Error("Max iterations reached");
}

// ========== UI ==========
function showLoading(msg='u.gg 데이터 조사 중...', sub='실제 승률 데이터를 가져오는 중입니다'){
  document.getElementById('loadingBox').style.display='flex';
  document.getElementById('counterContent').innerHTML='';
  document.getElementById('loadingMsg').textContent=msg;
  document.getElementById('loadingSub').textContent=sub;
}
function hideLoading(){document.getElementById('loadingBox').style.display='none';}

function renderCounters(data, lane){
  hideLoading();
  const counters = data.counters||[];
  if(!counters.length){
    document.getElementById('counterContent').innerHTML='<div class="error-box">카운터 데이터를 찾을 수 없습니다.</div>';
    return;
  }
  let html = `<div class="counter-grid">`;
  counters.forEach(c => {
    const wrNum = parseFloat(c.winRate)||0;
    const wrClass = wrNum>=55?'high':'';
    html += `<div class="counter-card">
      <img class="cc-img" src="${splashUrl(c.name)}" onerror="this.src='${iconUrl(c.name)}';this.style.objectPosition='center';" alt="${c.name}">
      <div class="cc-info">
        <div class="cc-top">
          <div class="cc-name">${c.name}</div>
          ${c.winRate?`<span class="cc-wr ${wrClass}">승률 ${c.winRate}</span>`:''}
        </div>
        <div class="cc-reason">${c.reason}</div>
        ${c.tip?`<div class="cc-tip">💡 ${c.tip}</div>`:''}
      </div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('counterContent').innerHTML = html;
}

async function selectLane(lane, btn){
  currentLane = lane;
  document.querySelectorAll('.lane-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(!currentChamp) return;

  // check cache
  const key = `${currentChamp}::${lane}`;
  if(cache[key]){
    renderCounters(cache[key], lane);
    return;
  }

  showLoading(
    `${currentChamp} ${laneNames[lane]} 카운터 조사 중...`,
    `u.gg Patch 26.8 ${laneNames[lane]} 승률 데이터`
  );
  try{
    const data = await fetchCounters(currentChamp, lane);
    renderCounters(data, lane);
    document.getElementById('splashRole').textContent = data.role||laneNames[lane];
  } catch(err){
    hideLoading();
    document.getElementById('counterContent').innerHTML=`
      <div class="error-box">
        데이터 로드 실패<br>
        <small>${err.message}</small><br>
        <button class="retry-btn" onclick="selectLane('${lane}', document.querySelector('.lane-tab.active'))">↺ 다시 시도</button>
      </div>`;
  }
}

function loadChampion(name){
  currentChamp = name;
  currentLane = 'top';

  // Splash
  const sb = document.getElementById('splashBanner');
  document.getElementById('splashImg').src = splashUrl(name);
  document.getElementById('splashImg').onerror = function(){this.src=iconUrl(name);this.style.height='120px';};
  document.getElementById('splashName').textContent = name;
  document.getElementById('splashRole').textContent = '분석 중...';
  sb.classList.add('show');

  // Drop zone
  const dz = document.getElementById('dropZone');
  dz.classList.add('has-champ');
  dz.innerHTML=`<img class="drop-champ-img" src="${iconUrl(name)}" onerror="this.src='${iconUrl('Ryze')}'"><div class="drop-champ-name">${name}</div>`;
  document.getElementById('resetBtn').classList.add('show');

  // Panel
  const panel = document.getElementById('resultPanel');
  panel.classList.add('show');
  document.getElementById('resultHeader').style.display='flex';
  document.getElementById('resultIcon').src=iconUrl(name);
  document.getElementById('resultName').textContent=name;
  document.getElementById('laneTabs').style.display='flex';

  // Reset tabs
  document.querySelectorAll('.lane-tab').forEach((b,i)=>{b.classList.toggle('active',i===0);});

  // Load top lane first
  showLoading(`${name} 탑 카운터 조사 중...`, 'u.gg Patch 26.8 탑 라인 승률 데이터');
  fetchCounters(name, 'top').then(data=>{
    renderCounters(data,'top');
    document.getElementById('splashRole').textContent=data.role||'탑';
  }).catch(err=>{
    hideLoading();
    document.getElementById('counterContent').innerHTML=`<div class="error-box">로드 실패: ${err.message}<br><button class="retry-btn" onclick="loadChampion('${name}')">↺ 다시 시도</button></div>`;
  });
}

function resetChamp(){
  currentChamp=null;currentLane='top';
  Object.keys(cache).forEach(k=>delete cache[k]);
  const dz=document.getElementById('dropZone');
  dz.classList.remove('has-champ');
  dz.innerHTML='<span class="drop-icon">⬇</span><span class="drop-label">챔피언을 여기에<br>드래그하세요</span>';
  document.getElementById('resetBtn').classList.remove('show');
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('splashBanner').classList.remove('show');
  document.getElementById('resultHeader').style.display='none';
  document.getElementById('laneTabs').style.display='none';
}

// ========== CHAMPION GRID ==========
let dragName=null;
function filterChamps(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  if(!q){renderGrid(champions);return;}
  const m=korMap[q];if(m){renderGrid([m]);return;}
  const km=Object.keys(korMap).filter(k=>k.includes(q)).map(k=>korMap[k]);
  if(km.length>0){renderGrid([...new Set(km)]);return;}
  renderGrid(champions.filter(c=>c.toLowerCase().includes(q)));
}
function renderGrid(list){
  const g=document.getElementById('champGrid');g.innerHTML='';
  list.forEach(name=>{
    const t=document.createElement('div');t.className='champ-tile';t.draggable=true;t.dataset.name=name;
    t.innerHTML=`<img src="${iconUrl(name)}" alt="${name}" onerror="this.src='${iconUrl('Ryze')}'"><span>${name}</span>`;
    t.addEventListener('dragstart',e=>{e.currentTarget.classList.add('dragging');e.dataTransfer.setData('text/plain',name);dragName=name;});
    t.addEventListener('dragend',e=>e.currentTarget.classList.remove('dragging'));
    t.addEventListener('touchstart',onTouchStart,{passive:true});
    g.appendChild(t);
  });
}
renderGrid(champions);

// ========== DRAG ==========
const dropZone=document.getElementById('dropZone');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('over'));
dropZone.addEventListener('drop',e=>{
  e.preventDefault();dropZone.classList.remove('over');
  const n=e.dataTransfer.getData('text/plain')||dragName;if(n)loadChampion(n);
});

// ========== TOUCH ==========
let touchChamp=null,ghost=null;
function onTouchStart(e){
  const tile=e.currentTarget;touchChamp=tile.dataset.name;
  ghost=tile.cloneNode(true);ghost.style.cssText='position:fixed;opacity:0.8;pointer-events:none;z-index:9999;width:56px;';
  document.body.appendChild(ghost);
  tile.addEventListener('touchmove',onTouchMove,{passive:false});
  tile.addEventListener('touchend',onTouchEnd);
}
function onTouchMove(e){
  e.preventDefault();const t=e.touches[0];
  if(ghost){ghost.style.left=(t.clientX-28)+'px';ghost.style.top=(t.clientY-28)+'px';}
  const dz=dropZone.getBoundingClientRect();
  dropZone.classList.toggle('over',t.clientX>dz.left&&t.clientX<dz.right&&t.clientY>dz.top&&t.clientY<dz.bottom);
}
function onTouchEnd(e){
  const t=e.changedTouches[0];if(ghost){ghost.remove();ghost=null;}
  dropZone.classList.remove('over');
  const dz=dropZone.getBoundingClientRect();
  if(t.clientX>dz.left&&t.clientX<dz.right&&t.clientY>dz.top&&t.clientY<dz.bottom)loadChampion(touchChamp);
  e.currentTarget.removeEventListener('touchmove',onTouchMove);
  e.currentTarget.removeEventListener('touchend',onTouchEnd);
}
</script>
