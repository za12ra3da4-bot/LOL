<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL 카운터 픽 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;600&display=swap');
:root{--gold:#C89B3C;--gold-light:#F0E6C8;--dark:#0A0E17;--blue:#00D4FF;--red:#FF4655;--green:#00C853;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--gold-light);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(200,155,60,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(200,155,60,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
header{text-align:center;padding:22px 20px 12px;position:relative;z-index:2;}
header h1{font-family:'Black Han Sans',sans-serif;font-size:clamp(1.2rem,4vw,1.9rem);color:var(--gold);letter-spacing:3px;text-shadow:0 0 20px rgba(200,155,60,0.5);}
header p{font-size:0.73rem;color:rgba(240,230,200,0.45);margin-top:5px;letter-spacing:1px;}
.divider{width:140px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:8px auto 0;}
.app{display:flex;flex-direction:column;align-items:center;gap:14px;padding:10px 14px 40px;position:relative;z-index:1;}

.drop-zone-wrap{width:100%;max-width:560px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.drop-zone{width:126px;height:126px;border-radius:50%;border:2px dashed var(--gold);background:radial-gradient(circle,rgba(200,155,60,0.08) 0%,transparent 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.3s ease;cursor:default;box-shadow:0 0 30px rgba(200,155,60,0.1),inset 0 0 30px rgba(200,155,60,0.05);}
.drop-zone.over{border-color:var(--blue);background:radial-gradient(circle,rgba(0,212,255,0.15) 0%,transparent 70%);box-shadow:0 0 40px rgba(0,212,255,0.3);transform:scale(1.05);}
.drop-zone.has-champ{border-style:solid;border-color:var(--gold);}
.drop-icon{font-size:2rem;opacity:0.4;}
.drop-label{font-size:0.68rem;color:rgba(200,155,60,0.6);text-align:center;margin-top:5px;letter-spacing:0.5px;line-height:1.4;}
.drop-champ-img{width:92px;height:92px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);box-shadow:0 0 20px rgba(200,155,60,0.4);}
.drop-champ-name{font-family:'Black Han Sans',sans-serif;font-size:0.82rem;color:var(--gold);margin-top:4px;letter-spacing:1px;}
.reset-btn{background:none;border:1px solid rgba(200,155,60,0.25);color:rgba(200,155,60,0.6);font-size:0.68rem;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;display:none;}
.reset-btn:hover{border-color:var(--gold);color:var(--gold);}
.reset-btn.show{display:inline-block;}

.splash-banner{width:100%;max-width:560px;border-radius:12px;overflow:hidden;position:relative;display:none;animation:fadeUp 0.5s ease;border:1px solid rgba(200,155,60,0.25);box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.splash-banner.show{display:block;}
.splash-banner img{width:100%;height:180px;object-fit:cover;object-position:top center;display:block;filter:brightness(0.85);}
.splash-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(10,14,23,0.75) 70%,rgba(10,14,23,0.97) 100%);pointer-events:none;}
.splash-label{position:absolute;bottom:10px;left:14px;right:14px;display:flex;align-items:flex-end;justify-content:space-between;}
.splash-label h3{font-family:'Black Han Sans',sans-serif;font-size:1.3rem;color:#fff;letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,0.8);}
.role-tag{font-size:0.63rem;background:rgba(200,155,60,0.25);border:1px solid rgba(200,155,60,0.5);color:var(--gold);padding:3px 9px;border-radius:20px;letter-spacing:1px;white-space:nowrap;}

.result-panel{width:100%;max-width:560px;background:rgba(15,25,35,0.97);border:1px solid rgba(200,155,60,0.2);border-radius:12px;overflow:hidden;display:none;animation:fadeUp 0.4s ease;}
.result-panel.show{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.result-header{background:linear-gradient(135deg,rgba(200,155,60,0.15),rgba(200,155,60,0.05));border-bottom:1px solid rgba(200,155,60,0.2);padding:11px 14px;display:flex;align-items:center;gap:10px;}
.result-champ-icon{width:42px;height:42px;border-radius:7px;object-fit:cover;border:1px solid var(--gold);}
.result-title h2{font-family:'Black Han Sans',sans-serif;font-size:0.95rem;color:var(--gold);letter-spacing:1px;}
.result-title p{font-size:0.66rem;color:rgba(240,230,200,0.5);margin-top:2px;}

.tab-bar{display:flex;border-bottom:1px solid rgba(200,155,60,0.2);background:rgba(0,0,0,0.2);}
.tab-btn{flex:1;background:none;border:none;color:rgba(200,155,60,0.5);font-family:'Noto Sans KR',sans-serif;font-size:0.66rem;padding:9px 2px;cursor:pointer;transition:all 0.2s;border-bottom:2px solid transparent;}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(200,155,60,0.06);}
.tab-btn:hover:not(.active){color:rgba(200,155,60,0.8);}
.tab-pane{display:none;padding:12px;}
.tab-pane.active{display:block;}

/* LANE FILTER */
.lane-filter{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px;}
.lane-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(200,155,60,0.2);border-radius:20px;padding:4px 11px;font-size:0.65rem;color:rgba(200,155,60,0.6);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;}
.lane-btn.active{background:rgba(200,155,60,0.15);border-color:var(--gold);color:var(--gold);}
.lane-btn:hover:not(.active){border-color:rgba(200,155,60,0.4);color:rgba(200,155,60,0.8);}
.lane-empty{font-size:0.75rem;color:rgba(240,230,200,0.4);text-align:center;padding:20px 0;}

/* COUNTERS */
.counter-list{display:flex;flex-direction:column;gap:9px;}
.counter-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,70,85,0.2);border-left:3px solid var(--red);border-radius:8px;padding:9px 11px;display:flex;gap:9px;align-items:flex-start;transition:background 0.2s;}
.counter-card:hover{background:rgba(255,70,85,0.06);}
.counter-splash{width:54px;height:54px;border-radius:7px;object-fit:cover;object-position:top center;border:1px solid rgba(255,70,85,0.4);flex-shrink:0;}
.counter-info{flex:1;}
.counter-head{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.counter-name{font-family:'Black Han Sans',sans-serif;font-size:0.88rem;color:#FF8A94;letter-spacing:0.5px;}
.lane-tag{font-size:0.56rem;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);color:#00D4FF;border-radius:10px;padding:1px 6px;}
.counter-badge{font-size:0.58rem;background:rgba(255,70,85,0.2);color:var(--red);border:1px solid rgba(255,70,85,0.3);border-radius:4px;padding:1px 6px;white-space:nowrap;display:inline-block;margin-top:2px;}
.counter-reason{font-size:0.71rem;color:rgba(240,230,200,0.65);margin-top:4px;line-height:1.6;}

/* RUNE / ITEM */
.sec-title{font-size:0.63rem;letter-spacing:1.5px;color:rgba(200,155,60,0.55);text-transform:uppercase;margin-bottom:5px;}
.chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;}
.chip{background:rgba(255,255,255,0.05);border:1px solid rgba(100,180,255,0.25);border-radius:20px;padding:3px 9px;font-size:0.67rem;color:rgba(200,220,255,0.85);}
.chip.gold{border-color:rgba(200,155,60,0.5);color:var(--gold);background:rgba(200,155,60,0.1);}
.chip.green{border-color:rgba(0,200,83,0.4);color:#69f0ae;background:rgba(0,200,83,0.08);}
.info-note{font-size:0.69rem;color:rgba(240,230,200,0.5);line-height:1.65;margin-top:4px;}

/* CHAMPION GRID */
.champ-section{width:100%;max-width:560px;}
.section-label{font-size:0.66rem;letter-spacing:2px;color:rgba(200,155,60,0.5);text-transform:uppercase;margin-bottom:8px;padding-left:2px;}
.search-wrap{position:relative;margin-bottom:9px;}
.search-wrap input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(200,155,60,0.2);border-radius:8px;padding:8px 12px 8px 32px;color:var(--gold-light);font-size:0.78rem;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color 0.2s;}
.search-wrap input::placeholder{color:rgba(200,155,60,0.3);}
.search-wrap input:focus{border-color:var(--gold);}
.search-wrap .s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(200,155,60,0.4);font-size:0.82rem;}
.champ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:6px;max-height:290px;overflow-y:auto;padding:2px;}
.champ-grid::-webkit-scrollbar{width:3px;}
.champ-grid::-webkit-scrollbar-thumb{background:rgba(200,155,60,0.3);border-radius:2px;}
.champ-tile{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:grab;transition:transform 0.15s;user-select:none;-webkit-user-drag:element;}
.champ-tile:active{cursor:grabbing;}
.champ-tile:hover{transform:translateY(-3px);}
.champ-tile img{width:48px;height:48px;border-radius:7px;object-fit:cover;border:1px solid rgba(200,155,60,0.25);pointer-events:none;transition:border-color 0.2s,box-shadow 0.2s;}
.champ-tile:hover img{border-color:var(--gold);box-shadow:0 0 10px rgba(200,155,60,0.35);}
.champ-tile span{font-size:0.53rem;color:rgba(240,230,200,0.55);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;}
.dragging{opacity:0.4;transform:scale(0.95);}
</style>
</head>

<header>
  <h1>⚔ COUNTER PICK ANALYZER</h1>
  <p>챔피언을 드래그 · 탑/정글/미드/원딜/서포터별 카운터 · 2026 시즌</p>
  <div class="divider"></div>
</header>
<div class="app">
  <div class="drop-zone-wrap">
    <div class="drop-zone" id="dropZone">
      <span class="drop-icon">⬇</span>
      <span class="drop-label">여기에 챔피언을<br>드래그하세요</span>
    </div>
    <button class="reset-btn" id="resetBtn" onclick="resetChamp()">↺ 초기화</button>
  </div>
  <div class="splash-banner" id="splashBanner">
    <img id="splashImg" src="" alt="">
    <div class="splash-overlay"></div>
    <div class="splash-label">
      <h3 id="splashName"></h3>
      <span class="role-tag" id="splashRole"></span>
    </div>
  </div>
  <div class="result-panel" id="resultPanel">
    <div class="result-header" id="resultHeader" style="display:none">
      <img class="result-champ-icon" id="resultIcon" src="" alt="">
      <div class="result-title"><h2 id="resultName"></h2><p id="resultSub"></p></div>
    </div>
    <div class="tab-bar" id="tabBar" style="display:none">
      <button class="tab-btn active" onclick="switchTab('lane',this)">🗺 라인별 카운터</button>
      <button class="tab-btn" onclick="switchTab('general',this)">⚔ 전체 카운터</button>
      <button class="tab-btn" onclick="switchTab('rune',this)">💎 룬</button>
      <button class="tab-btn" onclick="switchTab('item',this)">🗡 아이템</button>
    </div>
    <div id="tab-lane" class="tab-pane active"></div>
    <div id="tab-general" class="tab-pane"></div>
    <div id="tab-rune" class="tab-pane"></div>
    <div id="tab-item" class="tab-pane"></div>
  </div>
  <div class="champ-section">
    <div class="section-label">챔피언 목록 — 드래그하여 선택</div>
    <div class="search-wrap">
      <span class="s-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="한글/영어 검색 (자헨, 유나라, Yasuo...)" oninput="filterChamps()">
    </div>
    <div class="champ-grid" id="champGrid"></div>
  </div>
</div>

// ===== RENDER =====
const LANES = ["탑","정글","미드","원딜","서포터"];
let curLane = null;
let curData = null;

function switchTab(t,btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  btn.classList.add('active');
}

function setLane(lane,btn){
  curLane = lane;
  document.querySelectorAll('.lane-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderLaneContent();
}

function renderLaneContent(){
  const lc = curData.lc || {};
  const list = curLane ? (lc[curLane]||[]) : LANES.flatMap(l => (lc[l]||[]).map(c=>({...c,_l:l})));
  let html = '<div class="counter-list">';
  if(!list.length){html += '<div class="lane-empty">해당 라인 데이터 없음</div>';}
  list.forEach(c=>{
    const lTag = c._l ? `<span class="lane-tag">${c._l}</span>` : '';
    html += `<div class="counter-card">
      <img class="counter-splash" src="${splash(c.n)}" onerror="this.src='${icon(c.n)}';this.style.objectPosition='center';">
      <div class="counter-info">
        <div class="counter-head"><div class="counter-name">${c.n}</div>${lTag}</div>
        <span class="counter-badge">${c.s||'강함'}</span>
        <div class="counter-reason">${c.r}</div>
      </div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('tab-lane').innerHTML = `<div class="lane-filter">
    <button class="lane-btn ${!curLane?'active':''}" onclick="setLane(null,this)">전체</button>
    ${LANES.map(l=>`<button class="lane-btn ${curLane===l?'active':''}" onclick="setLane('${l}',this)">${l}</button>`).join('')}
  </div>` + html;
}

function renderRune(r){
  if(!r) return '<div class="lane-empty">데이터 없음</div>';
  return `<div class="sec-title">메인 — ${r.main}</div>
  <div class="chip-row">${(r.mr||[]).map((x,i)=>`<span class="chip ${i===0?'gold':''}">${x}</span>`).join('')}</div>
  <div class="sec-title">서브 — ${r.sub}</div>
  <div class="chip-row">${(r.sr||[]).map(x=>`<span class="chip">${x}</span>`).join('')}</div>
  <div class="sec-title">파편</div>
  <div class="chip-row">${(r.sh||[]).map(x=>`<span class="chip green">${x}</span>`).join('')}</div>
  ${r.note?`<div class="info-note">💡 ${r.note}</div>`:''}`;
}

function renderItem(it){
  if(!it) return '<div class="lane-empty">데이터 없음</div>';
  return `<div class="sec-title">시작 아이템</div>
  <div class="chip-row">${(it.starter||[]).map(x=>`<span class="chip">${x}</span>`).join('')}</div>
  <div class="sec-title">핵심 아이템</div>
  <div class="chip-row">${(it.core||[]).map(x=>`<span class="chip gold">${x}</span>`).join('')}</div>
  <div class="sec-title">신발</div>
  <div class="chip-row"><span class="chip green">${it.boots||'-'}</span></div>
  <div class="sec-title">상황별 아이템</div>
  <div class="chip-row">${(it.sit||[]).map(x=>`<span class="chip">${x}</span>`).join('')}</div>
  ${it.note?`<div class="info-note">💡 ${it.note}</div>`:''}`;
}

function loadChampion(name){
  curLane = null;
  const raw = DB[name] || fallback(name);
  curData = {...raw, name};

  // Splash
  const sb = document.getElementById('splashBanner');
  document.getElementById('splashImg').src = splash(name);
  document.getElementById('splashImg').onerror = function(){this.src=icon(name);this.style.height='120px';};
  document.getElementById('splashName').textContent = name;
  document.getElementById('splashRole').textContent = raw.role||'';
  sb.classList.add('show');

  // Drop zone
  const dz = document.getElementById('dropZone');
  dz.classList.add('has-champ');
  dz.innerHTML = `<img class="drop-champ-img" src="${icon(name)}" onerror="this.src='${icon('Ryze')}'"><div class="drop-champ-name">${name}</div>`;
  document.getElementById('resetBtn').classList.add('show');

  // Result panel
  const panel = document.getElementById('resultPanel');
  panel.classList.add('show');
  const rh = document.getElementById('resultHeader');
  rh.style.display = 'flex';
  document.getElementById('resultIcon').src = icon(name);
  document.getElementById('resultName').textContent = name;
  document.getElementById('resultSub').textContent = (raw.role||'') + ' · 2026 시즌';
  document.getElementById('tabBar').style.display = 'flex';

  // Reset to lane tab
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-lane').classList.add('active');
  document.querySelector('.tab-btn').classList.add('active');

  renderLaneContent();
  document.getElementById('tab-rune').innerHTML = renderRune(raw.runes);
  document.getElementById('tab-item').innerHTML = renderItem(raw.items);
}

function resetChamp(){
  const dz = document.getElementById('dropZone');
  dz.classList.remove('has-champ');
  dz.innerHTML = '<span class="drop-icon">⬇</span><span class="drop-label">여기에 챔피언을<br>드래그하세요</span>';
  document.getElementById('resetBtn').classList.remove('show');
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('splashBanner').classList.remove('show');
  document.getElementById('resultHeader').style.display = 'none';
  document.getElementById('tabBar').style.display = 'none';
  curData = null; curLane = null;
}

// ===== CHAMPION GRID =====
let allChamps = [...champions];
function filterChamps(){
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if(!q){renderChamps(allChamps);return;}
  const mapped = korMap[q];
  if(mapped){renderChamps([mapped]);return;}
  const km = Object.keys(korMap).filter(k=>k.includes(q)).map(k=>korMap[k]);
  if(km.length>0){renderChamps([...new Set(km)]);return;}
  renderChamps(allChamps.filter(c=>c.toLowerCase().includes(q)));
}

function renderChamps(list){
  const grid = document.getElementById('champGrid');
  grid.innerHTML = '';
  list.forEach(name=>{
    const tile = document.createElement('div');
    tile.className = 'champ-tile';
    tile.draggable = true;
    tile.dataset.name = name;
    tile.innerHTML = `<img src="${icon(name)}" alt="${name}" onerror="this.src='${icon('Ryze')}'"><span>${name}</span>`;
    tile.addEventListener('dragstart', e=>{e.currentTarget.classList.add('dragging');e.dataTransfer.setData('text/plain',name);dragName=name;});
    tile.addEventListener('dragend', e=>e.currentTarget.classList.remove('dragging'));
    tile.addEventListener('touchstart', onTouchStart, {passive:true});
    grid.appendChild(tile);
  });
}
renderChamps(allChamps);

let dragName = null;
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e=>{e.preventDefault();dropZone.classList.add('over');});
dropZone.addEventListener('dragleave', ()=>dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e=>{
  e.preventDefault(); dropZone.classList.remove('over');
  const n = e.dataTransfer.getData('text/plain')||dragName;
  if(n) loadChampion(n);
});

// ===== TOUCH =====
let touchChamp=null, ghost=null;
function onTouchStart(e){
  const tile = e.currentTarget; touchChamp = tile.dataset.name;
  ghost = tile.cloneNode(true);
  ghost.style.cssText = 'position:fixed;opacity:0.8;pointer-events:none;z-index:9999;width:56px;';
  document.body.appendChild(ghost);
  tile.addEventListener('touchmove', onTouchMove, {passive:false});
  tile.addEventListener('touchend', onTouchEnd);
}
function onTouchMove(e){
  e.preventDefault(); const t = e.touches[0];
  if(ghost){ghost.style.left=(t.clientX-28)+'px';ghost.style.top=(t.clientY-28)+'px';}
  const dz = dropZone.getBoundingClientRect();
  dropZone.classList.toggle('over', t.clientX>dz.left&&t.clientX<dz.right&&t.clientY>dz.top&&t.clientY<dz.bottom);
}
function onTouchEnd(e){
  const t=e.changedTouches[0]; if(ghost){ghost.remove();ghost=null;}
  dropZone.classList.remove('over');
  const dz=dropZone.getBoundingClientRect();
  if(t.clientX>dz.left&&t.clientX<dz.right&&t.clientY>dz.top&&t.clientY<dz.bottom) loadChampion(touchChamp);
  e.currentTarget.removeEventListener('touchmove',onTouchMove);
  e.currentTarget.removeEventListener('touchend',onTouchEnd);
}
</script>
</body>
</html>
